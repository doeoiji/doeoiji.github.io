<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Under Construction</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,system-ui,sans-serif}
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f172a,#1e293b,#020617);
  color:#fff;
  overflow:hidden;
}
.container{
  text-align:center;
  padding:40px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
  animation:fadeIn 1.5s ease;
}
h1{
  font-size:3rem;
  letter-spacing:2px;
  animation:glow 2s ease-in-out infinite alternate;
}
p{
  margin-top:15px;
  color:#cbd5e1;
  font-size:1.1rem;
}
.loader{
  margin:30px auto;
  width:60px;
  height:60px;
  border:6px solid rgba(255,255,255,0.2);
  border-top:6px solid #38bdf8;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
.footer{
  position:absolute;
  bottom:15px;
  right:20px;
  font-size:0.75rem;
  color:#94a3b8;
}

/* Floating particles */
.particle{
  position:absolute;
  width:6px;
  height:6px;
  background:#38bdf8;
  border-radius:50%;
  opacity:0.6;
  animation:float 6s linear infinite;
}
.particle:nth-child(1){left:10%;animation-delay:0s}
.particle:nth-child(2){left:30%;animation-delay:2s}
.particle:nth-child(3){left:50%;animation-delay:4s}
.particle:nth-child(4){left:70%;animation-delay:1s}
.particle:nth-child(5){left:90%;animation-delay:3s}

@keyframes spin{
  to{transform:rotate(360deg)}
}

@keyframes glow{
  from{text-shadow:0 0 10px #38bdf8}
  to{text-shadow:0 0 25px #0ea5e9,0 0 40px #38bdf8}
}

@keyframes float{
  0%{top:100%;opacity:0}
  50%{opacity:1}
  100%{top:-10%;opacity:0}
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}
</style>
</head>
<body>

<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>

<div class="container">
  <h1>🚧 Under Construction</h1>
  <p>This site is currently being built.<br>Something awesome is coming soon.</p>
  <div class="loader"></div>
</div>

<div class="footer">constructed by Julkarnain</div>

</body>
</html>
